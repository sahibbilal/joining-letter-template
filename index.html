<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Joining Letter Generator</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1><i class="fas fa-file-contract"></i> Professional Joining Letter Generator</h1>
            <p>Create professional joining letters with ease</p>
        </header>

        <div class="main-content">
            <div class="form-section">
                <div class="form-container">
                    <h2><i class="fas fa-edit"></i> Letter Details</h2>
                    
                    <form id="joiningLetterForm" class="form">
                        <div class="form-group">
                            <label for="letterType">Letter Type *</label>
                            <select id="letterType" name="letterType" required>
                                <option value="joining">Joining Letter</option>
                                <option value="offer">Offer Letter</option>
                            </select>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="candidateName">Candidate Name *</label>
                                <input type="text" id="candidateName" name="candidateName" required>
                            </div>
                            <div class="form-group">
                                <label for="position">Position *</label>
                                <input type="text" id="position" name="position" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="companyName">Company Name *</label>
                                <input type="text" id="companyName" name="companyName" required>
                            </div>
                            <div class="form-group">
                                <label for="department">Department</label>
                                <input type="text" id="department" name="department">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="joiningDate">Joining Date *</label>
                                <input type="date" id="joiningDate" name="joiningDate" required>
                            </div>
                            <div class="form-group">
                                <label for="offerExpiryDate">Offer Expiry Date</label>
                                <input type="date" id="offerExpiryDate" name="offerExpiryDate">
                                <small class="file-help">For offer letters only</small>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="salary">Salary Package</label>
                                <input type="text" id="salary" name="salary" placeholder="e.g., ₹50,000 per month">
                            </div>
                            <div class="form-group">
                                <label for="probationPeriod">Probation Period</label>
                                <input type="text" id="probationPeriod" name="probationPeriod" placeholder="e.g., 6 months">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="reportingManager">Reporting Manager</label>
                                <input type="text" id="reportingManager" name="reportingManager">
                            </div>
                            <div class="form-group">
                                <label for="workLocation">Work Location</label>
                                <input type="text" id="workLocation" name="workLocation">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="additionalTerms">Additional Terms & Conditions</label>
                            <textarea id="additionalTerms" name="additionalTerms" rows="4" placeholder="Any specific terms, benefits, or conditions..."></textarea>
                        </div>

                        <div class="form-group">
                            <label for="hrManager">HR Manager Name</label>
                            <input type="text" id="hrManager" name="hrManager">
                        </div>

                        <div class="form-group">
                            <label for="companyLogo">Company Logo</label>
                            <input type="file" id="companyLogo" name="companyLogo" accept="image/*">
                            <small class="file-help">Upload a transparent PNG logo for best results</small>
                        </div>

                        <div class="form-group">
                            <label for="signature">Digital Signature</label>
                            <div class="signature-container">
                                <canvas id="signatureCanvas" width="400" height="150"></canvas>
                                <div class="signature-controls">
                                    <button type="button" id="clearSignature" class="btn btn-outline btn-small">
                                        <i class="fas fa-eraser"></i> Clear
                                    </button>
                                </div>
                            </div>
                            <small class="file-help">Draw your signature in the box above</small>
                        </div>

                        <div class="form-actions">
                            <button type="button" id="previewBtn" class="btn btn-secondary">
                                <i class="fas fa-eye"></i> Preview Letter
                            </button>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-file-download"></i> Generate Letter
                            </button>
                            <button type="button" id="clearBtn" class="btn btn-outline">
                                <i class="fas fa-trash"></i> Clear Form
                            </button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>

    <!-- Modal for full letter preview -->
    <div id="previewModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Joining Letter Preview</h3>
                <button class="close-btn" id="closeModal">&times;</button>
            </div>
            <div class="modal-body">
                <div id="fullLetterPreview" class="full-letter-preview"></div>
            </div>
            <div class="modal-footer">
                <button id="printBtn" class="btn btn-primary">
                    <i class="fas fa-print"></i> Print Letter
                </button>
                <button id="downloadBtn" class="btn btn-secondary">
                    <i class="fas fa-download"></i> Download PDF
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
